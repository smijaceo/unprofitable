<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
  <title id="title">UNPROFITABLE TO PROFITABILITY badge logo</title>
  <desc id="desc">Black and white circular wordmark with serif UP monogram and upward arrow.</desc>
  <defs>
    <path id="top-arc" d="M 172 438 A 328 328 0 0 1 828 438" />
    <path id="bottom-arc" d="M 238 650 A 310 310 0 0 0 762 650" />
    <filter id="soft-white" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1000" height="1000" fill="#000000"/>

  <g fill="#ffffff" filter="url(#soft-white)">
    <text font-family="Geist, Arial, sans-serif" font-size="72" font-weight="600" letter-spacing="18" text-transform="uppercase">
      <textPath href="#top-arc" startOffset="50%" text-anchor="middle">UNPROFITABLE</textPath>
    </text>

    <text x="205" y="516" font-family="Geist Mono, ui-monospace, monospace" font-size="38" font-weight="700" letter-spacing="16">EST.</text>
    <text x="734" y="516" font-family="Geist Mono, ui-monospace, monospace" font-size="38" font-weight="700" letter-spacing="12">2024</text>

    <g aria-label="UP monogram with upward arrow">
      <text x="360" y="610" font-family="Georgia, 'Times New Roman', serif" font-size="235" font-weight="700">U</text>
      <text x="555" y="635" font-family="Georgia, 'Times New Roman', serif" font-size="235" font-weight="700">P</text>
      <path d="M 464 628 C 538 596 590 488 640 318" fill="none" stroke="#ffffff" stroke-width="54" stroke-linecap="butt" stroke-linejoin="miter"/>
      <path d="M 606 330 L 666 234 L 724 332 Z" fill="#ffffff"/>
      <path d="M 510 614 C 557 581 598 505 640 318" fill="none" stroke="#000000" stroke-width="7" stroke-linecap="butt" opacity="0.22"/>
    </g>

    <text font-family="Geist, Arial, sans-serif" font-size="41" font-weight="500" letter-spacing="21" text-transform="uppercase">
      <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle">TO PROFITABILITY</textPath>
    </text>

    <text x="500" y="828" text-anchor="middle" font-family="Geist Mono, ui-monospace, monospace" font-size="25" font-weight="400" letter-spacing="12">LOSING TODAY. LEARNING FOREVER.</text>
    <text x="500" y="889" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="39" font-weight="800" letter-spacing="14">PROFIT TOMORROW.</text>
  </g>
</svg>
